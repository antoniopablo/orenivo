<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 440px; height: 280px; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #06060a; position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  body::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse at 50% 0%, rgba(16,185,129,0.18) 0%, transparent 65%);
    pointer-events:none;
  }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; position: relative; z-index:1; }
  .icon { width: 36px; height: 36px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .icon svg { width: 18px; height: 18px; }
  .name { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
  .tagline { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.03em; line-height: 1.2; text-align: center; margin-bottom: 18px; position: relative; z-index:1; }
  .tagline em { font-style: normal; background: linear-gradient(135deg, #10b981, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .pills { display: flex; gap: 7px; position: relative; z-index:1; }
  .pill { padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; border: 1px solid; }
</style>
</head>
<body>
  <div class="logo">
    <div class="icon"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" fill="white" opacity="0.9"/><rect x="3" y="13" width="7" height="8" rx="1.5" fill="white" opacity="0.6"/><rect x="13" y="3" width="8" height="5" rx="1.5" fill="white" opacity="0.7"/><rect x="13" y="11" width="8" height="4" rx="1.5" fill="white" opacity="0.5"/></svg></div>
    <span class="name">Orenivo</span>
  </div>
  <div class="tagline">Organize your AI chats.<br><em>Folders, search & prompts.</em></div>
  <div class="pills">
    <span class="pill" style="background:rgba(16,163,127,0.1);border-color:rgba(16,163,127,0.3);color:#10a37f">⬡ ChatGPT</span>
    <span class="pill" style="background:rgba(217,119,6,0.1);border-color:rgba(217,119,6,0.3);color:#d97706">◈ Claude</span>
    <span class="pill" style="background:rgba(66,133,244,0.1);border-color:rgba(66,133,244,0.3);color:#4285f4">✦ Gemini</span>
    <span class="pill" style="background:rgba(99,102,241,0.1);border-color:rgba(99,102,241,0.3);color:#6366f1">◆ DeepSeek</span>
  </div>
</body>
</html>
