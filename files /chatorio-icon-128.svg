<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Folder/grid icon -->
  <!-- Top-left block (largest) -->
  <rect x="24" y="24" width="32" height="32" rx="6" fill="white" opacity="0.95"/>
  <!-- Bottom-left block -->
  <rect x="24" y="64" width="32" height="40" rx="6" fill="white" opacity="0.65"/>
  <!-- Top-right block -->
  <rect x="64" y="24" width="40" height="24" rx="6" fill="white" opacity="0.75"/>
  <!-- Middle-right block -->
  <rect x="64" y="56" width="40" height="20" rx="6" fill="white" opacity="0.55"/>
  <!-- Bottom-right block -->
  <rect x="64" y="84" width="40" height="20" rx="6" fill="white" opacity="0.40"/>
</svg>
